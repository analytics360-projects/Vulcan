services:
  # ── Vulcan App ──
  vulcan:
    build: .
    container_name: vulcan
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - vulcan-captures:/app/captures
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      tor-proxy:
        condition: service_healthy
    networks:
      - vulcan-net

  # ── Tor Proxy (anonimato + rotacion de IP para scraping) ──
  tor-proxy:
    image: dperson/torproxy:latest
    container_name: vulcan-tor-proxy
    ports:
      - "9050:9050"   # SOCKS5 proxy
      - "9051:9051"   # Control port (para rotar circuitos)
      - "8118:8118"   # Privoxy HTTP proxy
    environment:
      # Password para el control port (rotar IPs)
      PASSWORD: vulcan_tor_2024
      # Configuracion de Tor
      TOR_MaxCircuitDirtiness: "60"
      TOR_NewCircuitPeriod: "30"
    healthcheck:
      test: ["CMD-SHELL", "curl -s --socks5 127.0.0.1:9050 https://check.torproject.org/api/ip | grep -q 'true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - vulcan-net

  # ── Neo4j (Intelligence - grafos de relaciones) ──
  neo4j:
    image: neo4j:5-community
    container_name: vulcan-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/vulcan_neo4j_2024
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulcan-net

  # ── Qdrant (Intelligence - busqueda vectorial/semantica) ──
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vulcan-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulcan-net

  # ── Redis (cache, rate limiting) ──
  redis:
    image: redis:7-alpine
    container_name: vulcan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulcan-net

  # ── PostgreSQL (Scheduler) ──
  postgres:
    image: postgres:16-alpine
    container_name: vulcan-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vulcan
      POSTGRES_PASSWORD: vulcan_pg_2024
      POSTGRES_DB: vulcan
      POSTGRES_MULTIPLE_DATABASES: vulcan,vulcan_scheduler
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulcan"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulcan-net

  # ── MinIO (almacenamiento de objetos: screenshots, imagenes, HTML) ──
  minio:
    image: minio/minio:latest
    container_name: vulcan-minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: vulcan_admin
      MINIO_ROOT_PASSWORD: vulcan_minio_2024
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulcan-net

  # ── MinIO init (crea buckets automaticamente) ──
  minio-init:
    image: minio/mc:latest
    container_name: vulcan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set vulcan http://minio:9000 vulcan_admin vulcan_minio_2024;
      mc mb vulcan/vulcan-captures --ignore-existing;
      mc mb vulcan/vulcan-resources --ignore-existing;
      mc anonymous set download vulcan/vulcan-captures;
      exit 0;
      "
    networks:
      - vulcan-net

volumes:
  vulcan-captures:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
  redis-data:
  postgres-data:
  minio-data:

networks:
  vulcan-net:
    driver: bridge
